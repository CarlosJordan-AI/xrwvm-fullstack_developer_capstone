name: 'Lint Code'
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Print working directory
      run: pwd
    - name: Run Linter
      run: |
        pwd
        find . -name "*.py" -exec flake8 --max-line-length=120 --ignore=E501,W503,E302,E303,E401,F401,W291,W293,E711,E712,F841,E231,E275,E722,W292,E225,E226,E117,E128,E131,W191,E101,W391,E251,E265 {} +
        echo "Linted all the python files successfully"
